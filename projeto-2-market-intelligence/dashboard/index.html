<!DOCTYPE html>
<html>
<head>
    <title>Market Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            display: inline-block;
            padding: 20px;
            margin: 10px;
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>📰 Inteligência de Mercado</h1>

<canvas id="chart" width="800" height="400"></canvas>

<script>
fetch('data.csv')
.then(res => res.text())
.then(csv => {

    const rows = csv.split('\n').slice(1);

    const labels = [];
    const values = [];

    rows.forEach(row => {
        const [categoria, quantidade] = row.split(',');

        if (!categoria) return;

        labels.push(categoria);
        values.push(parseInt(quantidade));
    });

    new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Quantidade de notícias',
                data: values
            }]
        }
    });

});
</script>

</body>
</html>
